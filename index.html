<!DOCTYPE html>
<html>
<head>
    <title>Berry Hub Key</title>
</head>

<body style="background:black; color:pink; text-align:center; font-family:sans-serif;">

    <h1>🍓 BERRY HUB</h1>
    <h2>KEY ATUAL:</h2>

    <div id="key" style="font-size:35px; font-weight:bold;"></div>

    <button onclick="copyKey()" style="padding:10px; background:pink; border:none;">
        📋 Copiar Key
    </button>

    <script>
    let currentKey = "";

    function generateKey() {
        const time = Math.floor(Date.now() / 1000);
        const period = Math.floor(time / (60 * 60 * 24 * 5));

        function random(seed) {
            let x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let key = "";

        for (let i = 0; i < 7; i++) {
            let r = Math.floor(random(period + i) * chars.length);
            key += chars[r];
        }

        return key;
    }

    function showKey() {
        currentKey = generateKey();
        document.getElementById("key").innerText = currentKey;
    }

    function copyKey() {
        navigator.clipboard.writeText(currentKey);
        alert("Key copiada!");
    }

    showKey();
    </script>

</body>
</html>
