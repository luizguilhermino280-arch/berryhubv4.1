<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Berry Hub Key 💗</title>

<style>
body {
    background: #ff69b4;
    font-family: Arial;
    text-align: center;
    color: white;
    padding-top: 100px;
}

.box {
    background: #ff1493;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    box-shadow: 0 0 20px #fff;
}

h1 {
    font-size: 28px;
}

#key {
    font-size: 35px;
    margin: 20px 0;
    letter-spacing: 5px;
}

button {
    background: white;
    color: #ff1493;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ffe4e1;
}
</style>
</head>

<body>

<div class="box">
    <h1>BERRY HUB 💗</h1>

    <div id="key">KEY: LOADING...</div>

    <button onclick="copyKey()">Copiar Key</button>
</div>

<script>
function generateKey() {
    let time = Math.floor(Date.now() / 1000);
    let period = Math.floor(time / (60 * 60 * 24 * 5));

    function random(seed) {
        let x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let key = "";

    for (let i = 0; i < 7; i++) {
        let r = Math.floor(random(period + i) * chars.length);
        key += chars[r];
    }

    return key;
}

let key = generateKey();
document.getElementById("key").innerText = "KEY: " + key;

function copyKey() {
    navigator.clipboard.writeText(key);
    alert("Key copiada 💗");
}
</script>

</body>
</html>
